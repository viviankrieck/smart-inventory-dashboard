    <path d="M 35 10 L 35 40 M 5 25 L 35 40 L 65 25 M 5 55 L 35 70 L 65 55 M 35 40 L 35 70" fill="none" class="cube-stroke" />
  </g>
  
  <text x="120" y="68">
