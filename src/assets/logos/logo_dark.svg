      .cube-stroke { stroke: #1e222b; stroke-width: 3; stroke-linejoin: round; }
      .text-smart { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: bold; font-size: 32px; fill: #ffffff; }
      .text-inventory { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: normal; font-size: 32px; fill: #5c7b9e; }
    </style>
  </defs>
  <rect width="450" height="120" class="bg" rx="8"/>
  
  <g transform="translate(30, 25)">
